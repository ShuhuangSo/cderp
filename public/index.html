<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="icon" href="<%= BASE_URL %>favicon.ico">
    <title>CaseDance管理系统</title>
    <style>
        html,
        body {
            background-color: #f0f2f5;
            margin: 0px;
            padding: 0px;
            height: 100%;
        }
        /* ---- 初始加载进度条 ---- */
        #app-loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            z-index: 9999;
            overflow: hidden;
        }
        #app-loading-bar::after {
            content: '';
            display: block;
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, #409eff, #67c23a, #e6a23c, #409eff);
            background-size: 200% 100%;
            animation: loading-slide 1.2s ease-in-out infinite;
            border-radius: 0 2px 2px 0;
        }
        @keyframes loading-slide {
            0%   { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }
        #app-loading-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 9998;
            color: #909399;
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            font-size: 14px;
        }
        #app-loading-text .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #409eff;
            margin: 0 2px;
            animation: dot-bounce 1.4s ease-in-out infinite;
        }
        #app-loading-text .dot:nth-child(2) { animation-delay: 0.2s; }
        #app-loading-text .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot-bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
            40% { transform: translateY(-8px); opacity: 1; }
        }
    </style>
</head>
<body>
<noscript>
    <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled.
        Please enable it to continue.</strong>
</noscript>
<div id="app">
    <div id="app-loading-bar"></div>
    <div id="app-loading-text">
        系统加载中<span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
</div>
<!-- built files will be auto injected -->
</body>
</html>
